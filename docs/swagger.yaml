basePath: /
definitions:
  github_com_udevs_ai-chat_internal_interfaces_http_dto.ChatResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      last_response_id:
        type: string
      model:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.CreateChatRequest:
    properties:
      model:
        example: gpt-4o-mini
        type: string
      title:
        type: string
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.CreateMessageRequest:
    properties:
      chat_id:
        type: string
      message:
        items:
          type: integer
        type: array
      sender_id:
        type: string
    required:
    - chat_id
    - message
    - sender_id
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.GenerateImageRequest:
    properties:
      model:
        example: gpt-image-1
        type: string
      prompt:
        example: A friendly robot reading a book, watercolor style
        type: string
      quality:
        example: auto
        type: string
      size:
        example: 1024x1024
        type: string
    required:
    - prompt
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.GenerateImageResponse:
    properties:
      b64_json:
        type: string
      data_url:
        type: string
      url:
        type: string
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.ListChatsResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ChatResponse'
        type: array
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.ListMessagesResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.MessageResponse'
        type: array
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.MessageResponse:
    properties:
      chat_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      message:
        items:
          type: integer
        type: array
      sender_id:
        type: string
      updated_at:
        type: string
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.SendMessageRequest:
    properties:
      input:
        example: hello, who are you?
        type: string
      sender_id:
        type: string
    required:
    - input
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.SendMessageResponse:
    properties:
      chat:
        $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ChatResponse'
      reply:
        type: string
    type: object
  github_com_udevs_ai-chat_internal_interfaces_http_dto.UpdateMessageRequest:
    properties:
      message:
        items:
          type: integer
        type: array
    required:
    - message
    type: object
host: ai-chat.leetcoders.uz
info:
  contact: {}
  description: 'Chat backend: CRUD for messages plus AI chat sessions powered by the
    OpenAI Responses API.'
  title: AI Chat API
  version: "1.0"
paths:
  /v1/chats:
    get:
      parameters:
      - description: Page size (1-200, default 50)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ListChatsResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: List chats
      tags:
      - chats
    post:
      consumes:
      - application/json
      description: Allocates a chat with its own conversation state (server-side,
        via OpenAI Responses API).
      parameters:
      - description: Chat options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.CreateChatRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Create a new chat session
      tags:
      - chats
  /v1/chats/{id}:
    get:
      parameters:
      - description: Chat ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ChatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Get a chat by id
      tags:
      - chats
  /v1/chats/{id}/messages:
    get:
      parameters:
      - description: Chat ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Page size (1-200, default 50)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ListMessagesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: List messages for a chat
      tags:
      - chats
    post:
      consumes:
      - application/json
      description: Appends a user turn to the chat. The previous response_id is sent
        to OpenAI so the model has full conversation context.
      parameters:
      - description: Chat ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: User message
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Send a message and get the AI's reply
      tags:
      - chats
  /v1/images/generate:
    post:
      consumes:
      - application/json
      description: Generates one image from a text prompt using the configured OpenAI
        image model.
      parameters:
      - description: Image prompt
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.GenerateImageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.GenerateImageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Generate an image
      tags:
      - images
  /v1/messages:
    get:
      parameters:
      - description: Chat ID (UUID)
        in: query
        name: chat_id
        required: true
        type: string
      - description: Page size (1-200, default 50)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ListMessagesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: List messages for a chat
      tags:
      - messages
    post:
      consumes:
      - application/json
      description: Stores a new chat message. `message` is an arbitrary JSON object.
      parameters:
      - description: Message to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.CreateMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Create a message
      tags:
      - messages
  /v1/messages/{id}:
    delete:
      parameters:
      - description: Message ID (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Delete a message
      tags:
      - messages
    get:
      parameters:
      - description: Message ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Get a message by id
      tags:
      - messages
    put:
      consumes:
      - application/json
      parameters:
      - description: Message ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: New message body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.UpdateMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_udevs_ai-chat_internal_interfaces_http_dto.ErrorResponse'
      summary: Update a message body
      tags:
      - messages
schemes:
- https
- http
swagger: "2.0"

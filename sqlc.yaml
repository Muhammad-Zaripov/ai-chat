version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/infrastructure/postgres/sqlc/schema.sql"
    queries: "internal/infrastructure/postgres/sqlc/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/postgres/sqlc/gen"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "jsonb"
            go_type: "[]byte"
